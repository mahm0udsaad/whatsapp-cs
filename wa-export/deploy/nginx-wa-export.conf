# nginx server block for the isolated wa-export service.
# Domain: wa-export.nehgzbot.com  ->  127.0.0.1:2786 (this VPS)
# Install: /etc/nginx/sites-available/wa-export.nehgzbot.com  (symlink into sites-enabled)
# Then:    certbot --nginx -d wa-export.nehgzbot.com   (adds the 443 block automatically)
#
# This is a NEW, dedicated site — it does not touch bot.sufrah.sa or any other
# project's config. The service enforces its own Bearer-token auth.

server {
    listen 80;
    server_name wa-export.nehgzbot.com;

    location / {
        proxy_pass http://127.0.0.1:2786;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_buffering off;
        client_max_body_size 0;
    }
}
